name: Build Android APK

# Builds a true WebView-based APK using Capacitor (Ionic's native shell).
# The resulting APK uses Android System WebView (a system component present
# on every Android 5+) to render the web app — it does NOT depend on Chrome
# or any browser being installed.
#
# The web content loads from https://tuvyanoam-code.github.io/Quick-Event-Coordinator/
# at runtime, so the APK stays small and always shows the latest version.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.2)'
        required: false
        default: '1.0.2'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Accept Android SDK licenses + install packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null

      - name: Resolve version name
        run: |
          VERSION_NAME="${{ github.event.inputs.version || github.ref_name }}"
          VERSION_NAME="${VERSION_NAME#v}"
          VERSION_NAME="${VERSION_NAME:-1.0.2}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Install Capacitor
        run: |
          # npm ci would need a lockfile; a plain install is fine here.
          npm install

      - name: Prepare web-assets placeholder
        # Capacitor requires `webDir` to exist. Content is loaded at runtime
        # from server.url in capacitor.config.json, so this folder only needs
        # a minimal placeholder page.
        run: |
          mkdir -p www
          cat > www/index.html << 'EOF'
          <!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=https://tuvyanoam-code.github.io/Quick-Event-Coordinator/"></head><body>Loading…</body></html>
          EOF

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Patch Android app version + name
        run: |
          # Replace versionCode / versionName in android/app/build.gradle
          sed -i "s/versionCode 1/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"${VERSION_NAME}\"/" android/app/build.gradle
          # Replace the app launcher name (strings.xml)
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">Event Coord</string>|" android/app/src/main/res/values/strings.xml || true
          echo "--- build.gradle version section ---"
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Copy icons into Android mipmap folders
        run: |
          # Capacitor ships default launcher icons; overwrite with ours
          # (192×192 → xhdpi, 512×512 downsized in place by the build).
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp assets/icon-192.png "android/app/src/main/res/mipmap-$d/ic_launcher.png" || true
            cp assets/icon-192.png "android/app/src/main/res/mipmap-$d/ic_launcher_round.png" || true
          done
          # Replace the foreground adaptive-icon with a clean crop of our photo
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp assets/icon-192.png "android/app/src/main/res/mipmap-$d/ic_launcher_foreground.png" 2>/dev/null || true
          done

      - name: Build release APK via Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK with apksigner (v1 + v2 + v3)
        run: |
          # Locate tools
          APKSIGNER=$(find "$ANDROID_HOME" -name "apksigner" -type f 2>/dev/null | sort | tail -1)
          ZIPALIGN=$(find "$ANDROID_HOME" -name "zipalign" -type f 2>/dev/null | sort | tail -1)
          echo "apksigner: $APKSIGNER"
          echo "zipalign:  $ZIPALIGN"

          # Locate Gradle's unsigned release APK
          UNSIGNED=$(find android -path "*/build/outputs/apk/release/*.apk" | head -1)
          echo "Unsigned APK: $UNSIGNED"
          [ -z "$UNSIGNED" ] && { echo "No APK produced!"; exit 1; }

          # Generate a keystore fresh for this run (debug cert — fine for
          # sideload installs, prevents Play Store upload but that's a
          # separate concern).
          keytool -genkeypair \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Quick Event Coordinator, OU=Dev, O=QEC, L=Tel Aviv, ST=IL, C=IL"

          # zipalign then sign with all three schemes
          "$ZIPALIGN" -p -f 4 "$UNSIGNED" app-release-aligned.apk
          "$APKSIGNER" sign \
            --ks android.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out app-release-signed.apk \
            app-release-aligned.apk

          # Verify the result — fail the build if the APK is unsigned or
          # signature doesn't validate.
          "$APKSIGNER" verify -v app-release-signed.apk

          # Friendly rename
          cp app-release-signed.apk "quick-event-coordinator-${VERSION_NAME}.apk"
          echo "APK_FILE=quick-event-coordinator-${VERSION_NAME}.apk" >> $GITHUB_ENV

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_FILE }}
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('apk-v{0}-{1}', env.VERSION_NAME, github.run_number) || github.ref_name }}
          name: "APK v${{ env.VERSION_NAME }} (WebView)"
          body: |
            True WebView-based Android APK — uses Android System WebView to
            render the web app. Does NOT require Chrome or any other browser
            to be installed.

            **Installation:**
            1. Download the `.apk` below to your phone.
            2. Open the file. If prompted, enable "Install from unknown
               sources" for your browser/file manager.
            3. Tap Install.

            The app loads the live site from
            https://tuvyanoam-code.github.io/Quick-Event-Coordinator/
            at runtime, so any future site update is reflected immediately
            without needing to reinstall the APK.
          files: ${{ env.APK_FILE }}
          draft: false
          prerelease: false
