name: Build Android APK

# Builds a signed APK from the existing PWA using Bubblewrap.
# Runs in GitHub's cloud — no local tooling required.
# Trigger manually from the Actions tab ("Run workflow") or by pushing a
# tag matching v*. The resulting APK is attached to a GitHub Release and
# also uploaded as a workflow artifact for quick access.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap to use pre-installed JDK / Android SDK
        # GitHub's ubuntu-latest runner ships both. Writing a config file
        # here tells bubblewrap to use them instead of prompting to
        # download its own copies.
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          cat ~/.bubblewrap/config.json

      - name: Prepare build directory
        run: |
          mkdir -p build
          cp twa-manifest.json build/

      - name: Generate keystore (debug signing)
        working-directory: build
        run: |
          # Generate a fresh keystore each run. This means the app can be
          # installed directly from the APK file (sideload), but updates
          # won't be recognized as from the same origin by the OS. For a
          # real production workflow we'd store a persistent keystore in
          # GitHub Secrets; for sideload-only installs this is sufficient.
          keytool -genkeypair \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Quick Event Coordinator, OU=Dev, O=QEC, L=Tel Aviv, ST=IL, C=IL"

      - name: Set app version from input
        working-directory: build
        run: |
          VERSION_NAME="${{ github.event.inputs.version || github.ref_name }}"
          # Strip leading "v" if present (e.g. v1.0.0 → 1.0.0)
          VERSION_NAME="${VERSION_NAME#v}"
          # Fallback if empty
          VERSION_NAME="${VERSION_NAME:-1.0.0}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          # Compute a monotonically increasing appVersionCode from the run number
          VERSION_CODE="${{ github.run_number }}"
          # Patch twa-manifest.json with the resolved values
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            m.appVersionName = '$VERSION_NAME';
            m.appVersion = '$VERSION_NAME';
            m.appVersionCode = $VERSION_CODE;
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          "

      - name: Build TWA project
        working-directory: build
        env:
          # Pre-set bubblewrap's JDK/SDK to the runner's installed locations
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          # bubblewrap update scaffolds the Android project from twa-manifest.json
          # without prompting (requires an existing manifest).
          bubblewrap update --skipVersionUpgrade

      - name: Build signed APK
        working-directory: build
        run: |
          # Non-interactive build. Passwords supplied via env to avoid prompts.
          BUBBLEWRAP_JDK_PATH=$JAVA_HOME \
          BUBBLEWRAP_KEYSTORE_PASSWORD=android \
          BUBBLEWRAP_KEY_PASSWORD=android \
          bubblewrap build \
            --skipPwaValidation

      - name: Locate APK
        id: find-apk
        working-directory: build
        run: |
          APK=$(find . -name "app-release-signed.apk" -o -name "*.apk" 2>/dev/null | head -1)
          echo "Found APK: $APK"
          cp "$APK" "quick-event-coordinator-${VERSION_NAME}.apk"
          echo "apk_name=quick-event-coordinator-${VERSION_NAME}.apk" >> $GITHUB_OUTPUT

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find-apk.outputs.apk_name }}
          path: build/${{ steps.find-apk.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('apk-v{0}-{1}', env.VERSION_NAME, github.run_number) || github.ref_name }}
          name: "APK v${{ env.VERSION_NAME }}"
          body: |
            Sideload-installable Android APK generated from the live PWA at
            https://tuvyanoam-code.github.io/Quick-Event-Coordinator/

            **Installation on Android:**
            1. Download the `.apk` file below to your phone.
            2. Open the file from your Downloads notification.
            3. If prompted, enable "Install from unknown sources" for your
               browser/file-manager (Settings → Apps → Special access → Install
               unknown apps).
            4. Tap Install.

            The website continues to work normally — this APK is an additional
            distribution channel, not a replacement.
          files: build/${{ steps.find-apk.outputs.apk_name }}
          draft: false
          prerelease: false
